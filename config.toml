# Ganbot3 Configuration File
# This file contains the main configuration for ganbot
# Environment variables with GANBOT__ prefix will override these values
# Example: GANBOT__INVOKEAI_URL=http://localhost:9090 will override invokeai.url
# Example: GANBOT__OPENROUTER_TOKEN=sk-or... will override openrouter.token

[invokeai]
url = "http://localhost:9090"

[openrouter]
cheap_model = ["google/gemini-2.5-flash"]
chat_model = "google/gemini-3.1-pro-preview"
image_model = "google/gemini-2.5-flash-image"
dream_model = "google/gemini-3.1-pro-preview"

[image_host]
ssh_hostname = "direct.brage.info"
ssh_directory = "/home/svein/web/GAN/"
base_url = "https://brage.info/GAN/"

[webserver]
bind_address = "[::]"
port = 8485

[model_gallery]
prompts = [
  "1girl, portrait, outdoors, scenery, mountainous horizon",
  "1girl, 1boy, hinamori amu, sitting, side-by-side, hiking clothes, ruins, city, shugo chara!",
  "portrait of a woman",
  "fantasy landscape with mountains and lake",
  "macro photo, rainy forest, 1girl, glowing, night, fantasy, fairy forest, colorful details, bokeh",
  "abstract geometric art",
  "cyberpunk city at night",
  "anime, a strawberry shaped like a penguin, natural light",
  "floating castle, scenery. Seen from below, waterfalls cascade down from this stunning architectural innovation.",
]
[model_gallery.styles.Brushwork]
prepend_booru = "brushwork, traditional media, "
prepend_english = "In the style of brushwork: "
[model_gallery.styles."Ink Sketch"]
prepend_booru = "ink sketch style, "
prepend_english = "Rendered as an ink sketch: "
[model_gallery.styles.Watercolor]
prepend_booru = "watercolor, soft colors, "
prepend_english = "In watercolor style: "
[model_gallery.styles."Pixel Art"]
prepend_booru = "pixel art, 8bit, retro game style, "
prepend_english = "In pixel art style: "
[model_gallery.styles.Impressionist]
prepend_booru = "impressionism, loose brushwork, light and color, "
prepend_english = "In impressionist style: "
