# Ganbot3 Configuration File
# This file contains the main configuration for ganbot3
# Environment variables with GANBOT__ prefix will override these values
# Example: GANBOT__INVOKEAI_URL=http://localhost:9090 will override invokeai.url
# Example: GANBOT__OPENROUTER_TOKEN=sk-or... will override openrouter.token

[invokeai]
url = "http://localhost:9090"

[openrouter]
token = "your-openrouter-token-here"
chat_model = "anthropic/claude-4-sonnet"
image_model = "openai/gpt-4o"

# IRC server configurations
# You can have multiple IRC servers
[[irc]]
server = "irc.rizon.net"
tls = true
port = 6697
channels = ["#nanobot"]
nick = "GANBot-dev"
# nickserv_password = "your-nickserv-password"  # Optional

