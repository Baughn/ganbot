[package]
name = "ganbot3"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "comfyui_example"
path = "src/bin/comfyui_example.rs"

# Just during initial development
[lints.rust]
unused_variables = "allow"

[dependencies]
anyhow = "1.0.98"
async-trait = "0.1"
bytes = "1.8"
config = "0.14"
dotenvy = "0.15.7"
futures = "0.3.31"
image = "0.25.6"
indexmap = "2.6"
irc = "1.1.0"
kameo = "0.17.2"
kameo_actors = "0.2.0"
kameo_macros = "0.17.0"
notify = "7.0"
reqwest = { version = "0.12", features = ["json"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0.12"
tokio = { version = "1.0", features = ["full"] }
tokio-tungstenite = "0.24"
toml = "0.8"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
uuid = { version = "1.11", features = ["v4"] }
